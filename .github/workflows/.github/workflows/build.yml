name: Build Minecraft Mod
on:
  workflow_dispatch:
    inputs:
      mod_code:
        description: 'The code generated by AI'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fabric Example Mod
        uses: actions/checkout@v4
        with:
          repository: 'FabricMC/fabric-example-mod' # We use a template
          
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Inject AI Code
        run: |
          echo "${{ github.event.inputs.mod_code }}" > src/main/java/net/fabricmc/example/ExampleMod.java

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Mod
          path: build/libs/*.jar
